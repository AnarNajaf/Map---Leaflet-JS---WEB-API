<!doctype html>
<html>
  <head>
    <title>Farm Map System</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="mapMessage" class="map-message hidden"></div>
    <button class="logout-button" onclick="logout()">Logout</button>
    <div id="actionMessage" class="action-message hidden"></div>
    <div id="errorMessage" class="action-message hidden"></div>
    <div id="confirmModal" class="modal hidden">
      <div class="modal-content">
        <h3 id="confirmTitle">Are you sure?</h3>
        <p id="confirmMessage">This action cannot be undone.</p>

        <div class="modal-actions">
          <button id="confirmCancel" class="btn cancel">Cancel</button>
          <button id="confirmOk" class="btn danger">Yes, continue</button>
        </div>
      </div>
    </div>
    <div id="sensorSidebar" class="sensor-sidebar">
      <h3>Connected Sensors</h3>
      <div id="sensorList" class="sensor-list"></div>
    </div>
    <div id="map"></div>
    <form action="#" class="info_card" id="sensorCard">
      <span
        class="close-btn"
        onclick="document.getElementById('sensorCard').style.display = 'none'"
        >&times;</span
      >
      <h3>Sensor Information</h3>

      <label for="sensorId">Sensor ID:</label>
      <input type="text" id="sensorId" name="sensorId" />

      <label for="sensorType">Sensor Type:</label>
      <select id="sensorType" name="sensorType">
        <option value="">Select Sensor Type</option>
        <option value="7in1">7 in 1</option>
        <option value="5in1">5 in 1</option>
        <option value="3in1">3 in 1</option>
      </select>

      <label>Latitude:</label>
      <input type="text" id="sensorLat" name="sensorLat" readonly />

      <label>Longitude:</label>
      <input type="text" id="sensorLng" name="sensorLng" readonly />

      <label>
        <input type="checkbox" id="useTodayDate" />
        Get Today's Date
      </label>

      <label for="installationDate">Installation Date:</label>
      <input type="date" id="installationDate" name="installationDate" />

      <button type="button" id="submitBtn">Submit</button>
    </form>

    <form action="POST" class="info_card" id="motorCard" novalidate>
      <span
        class="close-btn"
        onclick="document.getElementById('motorCard').style.display = 'none'"
        >&times;</span
      >
      <h3>Motor Information</h3>

      <label for="motorId">Motor ID:</label>
      <input type="text" id="motorId" name="motorId" required />

      <label for="motorType">Sensor Type:</label>
      <select id="motorType" name="motorType">
        <option value="" disabled selected>Select Sensor Type</option>
        <option value="7in1">7 in 1</option>
        <option value="5in1">5 in 1</option>
        <option value="3in1">3 in 1</option>
      </select>
      <label for="motorLat">Latitude:</label>
      <input type="text" id="motorLat" name="motorLat" readonly />
      <label for="motorLng">Longitude:</label>
      <input type="text" id="motorLng" name="motorLng" readonly />

      <label>
        <input type="checkbox" id="useTodayDateMotor" />
        Get Today's Date
      </label>

      <label for="installationDateMotor">Installation Date:</label>
      <input
        type="date"
        id="installationDateMotor"
        name="installationDateMotor"
      />

      <button type="button" id="MotorSubmitBtn">Submit</button>
    </form>
    <script src="Data.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-geometryutil"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script type="module" src="firebase-live.js"></script>
    <script src="icons.js"></script>
    <script src="loaders.js"></script>
    <script src="script.js"></script>
    <script src="buttonControls.js"></script>
    <script src="toolbarbuttons.js"></script>
    <script src="Polygon.js"></script>
  </body>
</html>
